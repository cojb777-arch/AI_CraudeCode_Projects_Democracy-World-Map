<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界の民主度・自由度マップ</title>
<style>
  :root {
    --surface: #fcfcfb;
    --plane: #f9f9f7;
    --ink: #0b0b0b;
    --ink2: #52514e;
    --muted: #898781;
    --grid: #e1e0d9;
    --border: rgba(11,11,11,0.10);
    --nodata: #e8e7e2;
    --sea: #f3f2ee;
    --accent: #2a78d6;
    --panel-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1a19;
      --plane: #0d0d0d;
      --ink: #ffffff;
      --ink2: #c3c2b7;
      --muted: #898781;
      --grid: #2c2c2a;
      --border: rgba(255,255,255,0.10);
      --nodata: #242423;
      --sea: #141413;
      --accent: #3987e5;
      --panel-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--plane);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--grid);
    background: var(--surface);
    flex: none;
  }
  .head-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  h1 { font-size: 17px; font-weight: 700; letter-spacing: .02em; }
  select, button, input[type="text"] {
    font: inherit;
    font-size: 13px;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--grid);
    border-radius: 6px;
    padding: 5px 8px;
  }
  select { max-width: 300px; }
  button { cursor: pointer; }
  button:hover { border-color: var(--muted); }
  label.chk {
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    color: var(--ink2);
  }
  #desc { font-size: 12px; color: var(--ink2); margin-top: 6px; }
  main { flex: 1; display: flex; min-height: 0; }
  #mapwrap { flex: 1; position: relative; background: var(--sea); min-width: 0; }
  #map { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
  #map.panning { cursor: grabbing; }
  .country { stroke: var(--surface); stroke-width: 0.5; vector-effect: non-scaling-stroke; }
  .country:hover { stroke: var(--ink); stroke-width: 1.2; }
  .country.selected { stroke: var(--ink); stroke-width: 1.6; }
  .conflict-dot {
    fill: #d03b3b;
    fill-opacity: 0.55;
    stroke: var(--surface);
    stroke-width: 1;
    vector-effect: non-scaling-stroke;
    pointer-events: none;
  }
  #legend {
    position: absolute;
    left: 12px;
    bottom: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: var(--panel-shadow);
    font-size: 11px;
    color: var(--ink2);
    max-width: 300px;
  }
  #legend .bar { height: 10px; border-radius: 5px; margin: 6px 0 3px; border: 1px solid var(--border); }
  #legend .ticks { display: flex; justify-content: space-between; }
  #legend .swatches { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
  #legend .sw { display: flex; align-items: center; gap: 6px; }
  #legend .sw i { width: 14px; height: 14px; border-radius: 4px; border: 1px solid var(--border); flex: none; }
  #legend .nd { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  #legend .nd i { width: 14px; height: 14px; border-radius: 4px; background: var(--nodata); border: 1px solid var(--border); }
  #zoomctl { position: absolute; right: 12px; top: 12px; display: flex; flex-direction: column; gap: 4px; }
  #zoomctl button { width: 32px; height: 32px; font-size: 16px; line-height: 1; box-shadow: var(--panel-shadow); }
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--panel-shadow);
    padding: 8px 10px;
    font-size: 12px;
    display: none;
    z-index: 10;
    max-width: 260px;
  }
  #tooltip .tt-name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
  #tooltip .tt-val { font-size: 15px; font-weight: 700; }
  #tooltip .tt-sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
  aside {
    width: 320px;
    flex: none;
    background: var(--surface);
    border-left: 1px solid var(--grid);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #detail { padding: 12px 14px; border-bottom: 1px solid var(--grid); overflow-y: auto; max-height: 55%; }
  #detail .d-empty { color: var(--muted); font-size: 12px; }
  #detail h2 { font-size: 16px; margin-bottom: 8px; }
  .d-row { margin-bottom: 8px; }
  .d-top { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; }
  .d-top .d-label { color: var(--ink2); }
  .d-top .d-val { font-weight: 700; font-variant-numeric: tabular-nums; }
  .d-top .d-rank { color: var(--muted); font-size: 11px; margin-left: 6px; font-weight: 400; }
  .d-bar { height: 5px; border-radius: 3px; background: var(--grid); margin-top: 3px; overflow: hidden; }
  .d-bar i { display: block; height: 100%; border-radius: 3px; }
  #ranking { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 10px 14px; }
  #ranking h3 { font-size: 12px; color: var(--ink2); margin-bottom: 6px; font-weight: 600; }
  #search { width: 100%; margin-bottom: 6px; }
  #ranklist { flex: 1; overflow-y: auto; font-size: 12px; }
  .r-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 4px;
    border-radius: 5px;
    cursor: pointer;
  }
  .r-row:hover { background: var(--plane); }
  .r-row.selected { background: var(--plane); outline: 1px solid var(--border); }
  .r-rank { width: 30px; color: var(--muted); font-variant-numeric: tabular-nums; text-align: right; flex: none; }
  .r-dot { width: 10px; height: 10px; border-radius: 3px; border: 1px solid var(--border); flex: none; }
  .r-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .r-val { font-variant-numeric: tabular-nums; color: var(--ink2); flex: none; }
  footer {
    flex: none;
    font-size: 10px;
    color: var(--muted);
    padding: 4px 16px;
    background: var(--surface);
    border-top: 1px solid var(--grid);
  }
  @media (max-width: 800px) {
    main { flex-direction: column; }
    aside { width: 100%; border-left: none; border-top: 1px solid var(--grid); max-height: 45%; }
    #mapwrap { min-height: 45%; }
  }
</style>
</head>
<body>
<header>
  <div class="head-row">
    <h1>🌍 世界の民主度・自由度マップ</h1>
    <select id="indicator"></select>
    <label class="chk"><input type="checkbox" id="overlay">紛争死者数を重ねる（10年累計・円の大きさ）</label>
  </div>
  <div id="desc"></div>
</header>
<main>
  <div id="mapwrap">
    <svg id="map" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet">
      <g id="zoomg"><g id="countries"></g><g id="dots"></g></g>
    </svg>
    <div id="legend"></div>
    <div id="zoomctl">
      <button id="zin" title="拡大">＋</button>
      <button id="zout" title="縮小">－</button>
      <button id="zreset" title="リセット">⟲</button>
    </div>
  </div>
  <aside>
    <div id="detail"><div class="d-empty">国をクリックすると、その国の全指標を表示します。</div></div>
    <div id="ranking">
      <h3 id="ranktitle"></h3>
      <input type="text" id="search" placeholder="国名で検索…">
      <div id="ranklist"></div>
    </div>
  </aside>
</main>
<footer>
  出典: V-Dem研究所（民主主義・自由・人権・法の支配指数、政治体制分類）、Transparency International（腐敗認識指数）、UCDP/PRIO（紛争死者数）— いずれも Our World in Data 経由。値は各国の最新年。
</footer>
<script src="data/geo.js"></script>
<script src="data/indicators.js"></script>
<script>
'use strict';

/* ---------- 指標定義 ---------- */
const D2 = v => v.toFixed(2);
const INT = v => Math.round(v).toLocaleString('ja-JP');
const REGIME_LABELS = ['閉鎖的独裁', '選挙権威主義', '選挙民主主義', '自由民主主義'];
const INDICATORS = [
  { key: 'libdem', name: '自由民主主義指数（V-Dem）', type: 'div', domain: [0, 1], fmt: D2, higherBetter: true,
    desc: '自由で公正な選挙に加え、司法の独立・法の支配・個人の自由が守られている度合い（0〜1）。青いほど民主的、赤いほど独裁的。' },
  { key: 'electdem', name: '選挙民主主義指数（V-Dem）', type: 'div', domain: [0, 1], fmt: D2, higherBetter: true,
    desc: '選挙が自由・公正で、実質的な政権交代が可能かどうかの度合い（0〜1）。青いほど民主的、赤いほど独裁的。' },
  { key: 'regime', name: '政治体制の分類（Regimes of the World）', type: 'regime', fmt: v => REGIME_LABELS[v] || '?', higherBetter: true,
    desc: '4分類：閉鎖的独裁（選挙なし）／選挙権威主義（選挙はあるが不公正）／選挙民主主義／自由民主主義。' },
  { key: 'freexp', name: '表現・報道の自由指数（V-Dem）', type: 'div', domain: [0, 1], fmt: D2, higherBetter: true,
    desc: '言論・報道・学問の自由と政府による検閲のなさ（0〜1）。青いほど自由。' },
  { key: 'humrights', name: '人権指数（V-Dem）', type: 'div', domain: [0, 1], fmt: D2, higherBetter: true,
    desc: '拷問・政治的殺害・強制労働からの自由、身体の自由の保障度合い（0〜1）。青いほど人権が守られている。' },
  { key: 'rulelaw', name: '法の支配指数（V-Dem）', type: 'div', domain: [0, 1], fmt: D2, higherBetter: true,
    desc: '政府高官も法に従い、司法が独立して公正に機能している度合い（0〜1）。青いほど法の支配が強い。' },
  { key: 'cpi', name: '腐敗認識指数（Transparency International）', type: 'div', domain: [0, 100], fmt: INT, higherBetter: true,
    desc: '公的部門の清潔さ（0〜100、高いほど腐敗が少ない）。青いほどクリーン、赤いほど腐敗が深刻。' },
  { key: 'conflict10', name: '紛争死者数：直近10年の累計（UCDP/PRIO）', type: 'log', fmt: INT, higherBetter: false,
    desc: 'その国の領域内で起きた武力紛争（国家間・内戦・一方的暴力）による死者数の10年間累計。対数スケール、濃い赤ほど多い。' },
  { key: 'conflict', name: '紛争死者数：最新年（UCDP/PRIO）', type: 'log', fmt: INT, higherBetter: false,
    desc: 'その国の領域内で起きた武力紛争による死者数（最新年）。対数スケール、濃い赤ほど多い。' },
];
const MIN_YEAR = 2014; // これより古い「最新値」は消滅国家等なので除外

/* ---------- カラースケール ---------- */
const dark = matchMedia('(prefers-color-scheme: dark)');
const hex2rgb = h => [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
function makeRamp(stops) {
  const pts = stops.map(([t, h]) => [t, hex2rgb(h)]);
  return t => {
    t = Math.max(0, Math.min(1, t));
    let i = 0;
    while (i < pts.length - 2 && t > pts[i + 1][0]) i++;
    const [t0, c0] = pts[i], [t1, c1] = pts[i + 1];
    const u = t1 === t0 ? 0 : (t - t0) / (t1 - t0);
    const c = c0.map((v, j) => Math.round(v + (c1[j] - v) * u));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  };
}
const DIV_STOPS_L = [[0, '#7a1f1f'], [0.15, '#902a25'], [0.3, '#c0453f'], [0.42, '#e2856b'], [0.5, '#f0efec'], [0.58, '#9ec5f4'], [0.7, '#6da7ec'], [0.85, '#2a78d6'], [1, '#0d366b']];
const DIV_STOPS_D = [[0, '#f5a08d'], [0.18, '#e66767'], [0.36, '#b03a34'], [0.5, '#383835'], [0.64, '#2a6bc0'], [0.82, '#3987e5'], [1, '#9ec5f4']];
const SEQ_STOPS_L = [[0, '#faeee8'], [0.25, '#f2c1ad'], [0.5, '#e2856b'], [0.7, '#c0453f'], [0.85, '#902a25'], [1, '#5f1512']];
const SEQ_STOPS_D = [[0, '#241a17'], [0.25, '#5c2622'], [0.5, '#902a25'], [0.7, '#c0453f'], [0.85, '#e66767'], [1, '#f5a08d']];
const REGIME_COLORS_L = ['#902a25', '#e2856b', '#6da7ec', '#1c5cab'];
const REGIME_COLORS_D = ['#e66767', '#f5a08d', '#6da7ec', '#3987e5'];
let divRamp, seqRamp, regimeColors;
function setRamps() {
  const d = dark.matches;
  divRamp = makeRamp(d ? DIV_STOPS_D : DIV_STOPS_L);
  seqRamp = makeRamp(d ? SEQ_STOPS_D : SEQ_STOPS_L);
  regimeColors = d ? REGIME_COLORS_D : REGIME_COLORS_L;
}
setRamps();

/* ---------- データ整形 ---------- */
const IND_BY_KEY = {};
for (const ind of INDICATORS) {
  IND_BY_KEY[ind.key] = ind;
  const raw = INDICATOR_DATA[ind.key];
  ind.values = {}; ind.years = {};
  for (const [c, v] of Object.entries(raw.values)) {
    if (ind.type !== 'log' && raw.years[c] < MIN_YEAR) continue;
    ind.values[c] = v;
    ind.years[c] = raw.years[c];
  }
  if (ind.type === 'log') ind.max = Math.max(...Object.values(ind.values));
  // 順位（良い順。紛争死者は多い順）
  const sorted = Object.entries(ind.values)
    .sort((a, b) => ind.higherBetter ? b[1] - a[1] : b[1] - a[1]);
  ind.rank = {}; ind.total = sorted.length;
  sorted.forEach(([c], i) => ind.rank[c] = i + 1);
  ind.sorted = sorted;
}

function colorFor(ind, v) {
  if (v == null) return 'var(--nodata)';
  if (ind.type === 'regime') return regimeColors[Math.round(v)] || 'var(--nodata)';
  if (ind.type === 'log') return seqRamp(v <= 0 ? 0 : Math.log10(v + 1) / Math.log10(ind.max + 1));
  const [lo, hi] = ind.domain;
  return divRamp((v - lo) / (hi - lo));
}

/* ---------- 国名（日本語） ---------- */
let dispNames = null;
try { dispNames = new Intl.DisplayNames(['ja'], { type: 'region' }); } catch (e) { }
const nameCache = {};
function jaName(iso3, fallback) {
  if (nameCache[iso3]) return nameCache[iso3];
  let n = fallback;
  const iso2 = ISO3_TO_ISO2[iso3];
  if (iso2 && dispNames) {
    try { const d = dispNames.of(iso2); if (d && d !== iso2) n = d; } catch (e) { }
  }
  return nameCache[iso3] = n;
}

/* ---------- 投影（Natural Earth） ---------- */
const W = 960, H = 500, K = 175, CX = 480, CY = 250;
function project(lon, lat) {
  const lam = lon * Math.PI / 180, phi = lat * Math.PI / 180;
  const p2 = phi * phi, p4 = p2 * p2;
  const x = lam * (0.8707 - 0.131979 * p2 + p4 * (-0.013791 + p4 * (0.003971 * p2 - 0.001529 * p4)));
  const y = phi * (1.007226 + p2 * (0.015085 + p4 * (-0.044475 + 0.028874 * p2 - 0.005916 * p4)));
  return [CX + x * K, CY - y * K];
}
function ringPath(ring) {
  let d = '';
  for (let i = 0; i < ring.length; i++) {
    const [x, y] = project(ring[i][0], ring[i][1]);
    d += (i ? 'L' : 'M') + x.toFixed(1) + ' ' + y.toFixed(1);
  }
  return d + 'Z';
}
function polyArea(ring) { // 概算面積（重心・最大リング判定用）
  let a = 0;
  for (let i = 0; i < ring.length - 1; i++) a += ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
  return Math.abs(a / 2);
}

/* ---------- 地図構築 ---------- */
const gCountries = document.getElementById('countries');
const gDots = document.getElementById('dots');
const countryPaths = {}; // iso3 -> path要素
const centroids = {};    // iso3 -> [x,y]
for (const f of WORLD_GEO.features) {
  const iso3 = f.id;
  if (iso3 === 'ATA') continue; // 南極は除外
  const geom = f.geometry;
  const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
  let d = '', best = null, bestA = -1;
  for (const poly of polys) {
    for (const ring of poly) d += ringPath(ring);
    const a = polyArea(poly[0]);
    if (a > bestA) { bestA = a; best = poly[0]; }
  }
  const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  p.setAttribute('d', d);
  p.setAttribute('class', 'country');
  p.setAttribute('fill-rule', 'evenodd');
  p.dataset.iso3 = iso3;
  p.dataset.name = f.properties.name;
  gCountries.appendChild(p);
  if (iso3 && iso3.length === 3) countryPaths[iso3] = p;
  if (best) {
    let sx = 0, sy = 0;
    for (const pt of best) { sx += pt[0]; sy += pt[1]; }
    centroids[iso3] = project(sx / best.length, sy / best.length);
  }
}

/* ---------- UI要素 ---------- */
const sel = document.getElementById('indicator');
INDICATORS.forEach((ind, i) => {
  const o = document.createElement('option');
  o.value = ind.key; o.textContent = ind.name;
  sel.appendChild(o);
});
let current = INDICATORS[0];
let selectedIso = null;
const tooltip = document.getElementById('tooltip') || (() => {
  const t = document.createElement('div'); t.id = 'tooltip'; document.body.appendChild(t); return t;
})();

/* ---------- 描画更新 ---------- */
function repaint() {
  for (const [iso3, p] of Object.entries(countryPaths)) {
    p.style.fill = colorFor(current, current.values[iso3]);
  }
  // ISO3でない図形（北キプロス等）はデータなし色
  for (const p of gCountries.children) {
    if (!(p.dataset.iso3 in countryPaths)) p.style.fill = 'var(--nodata)';
  }
  renderLegend();
  renderRanking();
  renderDetail();
  document.getElementById('desc').textContent = current.desc;
}

function renderLegend() {
  const lg = document.getElementById('legend');
  let html = `<div style="font-weight:600;color:var(--ink)">${current.name}</div>`;
  if (current.type === 'regime') {
    html += '<div class="swatches">' + REGIME_LABELS.map((l, i) =>
      `<div class="sw"><i style="background:${regimeColors[i]}"></i>${l}</div>`).join('') + '</div>';
  } else {
    const ramp = current.type === 'log' ? seqRamp : divRamp;
    const stops = [];
    for (let i = 0; i <= 20; i++) stops.push(`${ramp(i / 20)} ${i * 5}%`);
    html += `<div class="bar" style="background:linear-gradient(90deg,${stops.join(',')})"></div>`;
    if (current.type === 'log') {
      const m = current.max;
      html += `<div class="ticks"><span>0</span><span>${INT(Math.sqrt(m))}</span><span>${INT(m)}</span></div>
               <div style="color:var(--muted);margin-top:2px">※対数スケール</div>`;
    } else {
      const [lo, hi] = current.domain;
      const mid = (lo + hi) / 2;
      html += `<div class="ticks"><span>${current.fmt(lo)} 独裁的</span><span>${current.fmt(mid)}</span><span>民主的 ${current.fmt(hi)}</span></div>`;
    }
  }
  html += '<div class="nd"><i></i>データなし</div>';
  lg.innerHTML = html;
}

function renderRanking() {
  document.getElementById('ranktitle').textContent =
    current.higherBetter ? 'ランキング（高い順 = 良い順）' : 'ランキング（死者数の多い順）';
  const q = document.getElementById('search').value.trim().toLowerCase();
  const list = document.getElementById('ranklist');
  const rows = [];
  for (const [iso3, v] of current.sorted) {
    if (!(iso3 in countryPaths) && !q) { /* 地図にない国も一覧には出す */ }
    const name = jaName(iso3, iso3);
    if (q && !name.toLowerCase().includes(q) && !iso3.toLowerCase().includes(q)) continue;
    rows.push(`<div class="r-row${iso3 === selectedIso ? ' selected' : ''}" data-iso3="${iso3}">
      <span class="r-rank">${current.rank[iso3]}</span>
      <span class="r-dot" style="background:${colorFor(current, v)}"></span>
      <span class="r-name">${name}</span>
      <span class="r-val">${current.fmt(v)}</span></div>`);
  }
  list.innerHTML = rows.join('');
}

function renderDetail() {
  const el = document.getElementById('detail');
  if (!selectedIso) {
    el.innerHTML = '<div class="d-empty">国をクリックすると、その国の全指標を表示します。</div>';
    return;
  }
  const name = jaName(selectedIso, selectedIso);
  let html = `<h2>${name}</h2>`;
  for (const ind of INDICATORS) {
    const v = ind.values[selectedIso];
    if (v == null) {
      html += `<div class="d-row"><div class="d-top"><span class="d-label">${ind.name.split('（')[0]}</span><span class="d-val" style="color:var(--muted)">—</span></div></div>`;
      continue;
    }
    let t;
    if (ind.type === 'regime') t = (v + 1) / 4;
    else if (ind.type === 'log') t = v <= 0 ? 0 : Math.log10(v + 1) / Math.log10(ind.max + 1);
    else t = (v - ind.domain[0]) / (ind.domain[1] - ind.domain[0]);
    html += `<div class="d-row">
      <div class="d-top"><span class="d-label">${ind.name.split('（')[0]}</span>
        <span class="d-val">${ind.fmt(v)}<span class="d-rank">${ind.rank[selectedIso]}位/${ind.total}か国 (${ind.years[selectedIso]}年)</span></span></div>
      <div class="d-bar"><i style="width:${(t * 100).toFixed(0)}%;background:${colorFor(ind, v)}"></i></div>
    </div>`;
  }
  el.innerHTML = html;
}

/* ---------- 紛争オーバーレイ ---------- */
function renderOverlay() {
  gDots.innerHTML = '';
  if (!document.getElementById('overlay').checked) return;
  const ind = IND_BY_KEY.conflict10;
  const entries = Object.entries(ind.values).filter(([c, v]) => v > 0 && centroids[c]).sort((a, b) => b[1] - a[1]);
  const maxV = ind.max;
  for (const [iso3, v] of entries) {
    const r = 2 + 26 * Math.sqrt(v / maxV);
    const [x, y] = centroids[iso3];
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', r);
    c.setAttribute('class', 'conflict-dot');
    gDots.appendChild(c);
  }
}

/* ---------- ツールチップ・選択 ---------- */
gCountries.addEventListener('pointermove', e => {
  const p = e.target.closest('.country');
  if (!p) { tooltip.style.display = 'none'; return; }
  const iso3 = p.dataset.iso3;
  const name = jaName(iso3, p.dataset.name);
  const v = current.values[iso3];
  let body;
  if (v == null) body = '<span style="color:var(--muted)">データなし</span>';
  else {
    body = `<span class="tt-val">${current.fmt(v)}</span>
      <div class="tt-sub">${current.rank[iso3]}位 / ${current.total}か国（${current.years[iso3]}年）</div>`;
  }
  const cf = IND_BY_KEY.conflict10.values[iso3];
  const extra = (current.type !== 'log' && cf > 0)
    ? `<div class="tt-sub">紛争死者数(10年): ${INT(cf)}人</div>` : '';
  tooltip.innerHTML = `<div class="tt-name">${name}</div>${body}${extra}`;
  tooltip.style.display = 'block';
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  let tx = e.clientX + 14, ty = e.clientY + 14;
  if (tx + tw > innerWidth - 8) tx = e.clientX - tw - 14;
  if (ty + th > innerHeight - 8) ty = e.clientY - th - 14;
  tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';
});
gCountries.addEventListener('pointerleave', () => tooltip.style.display = 'none');
let downXY = null;
document.getElementById('map').addEventListener('pointerdown', e => downXY = [e.clientX, e.clientY]);
gCountries.addEventListener('click', e => {
  if (downXY && Math.hypot(e.clientX - downXY[0], e.clientY - downXY[1]) > 4) return; // ドラッグは無視
  const p = e.target.closest('.country');
  if (!p) return;
  selectCountry(p.dataset.iso3 === selectedIso ? null : p.dataset.iso3);
});
function selectCountry(iso3) {
  if (selectedIso && countryPaths[selectedIso]) countryPaths[selectedIso].classList.remove('selected');
  selectedIso = iso3;
  if (iso3 && countryPaths[iso3]) {
    countryPaths[iso3].classList.add('selected');
    gCountries.appendChild(countryPaths[iso3]); // 枠線を前面に
  }
  renderDetail();
  renderRanking();
}
document.getElementById('ranklist').addEventListener('click', e => {
  const row = e.target.closest('.r-row');
  if (row) selectCountry(row.dataset.iso3 === selectedIso ? null : row.dataset.iso3);
});

/* ---------- ズーム・パン ---------- */
const zoomg = document.getElementById('zoomg');
const svg = document.getElementById('map');
let tf = { x: 0, y: 0, k: 1 };
function applyTf() { zoomg.setAttribute('transform', `translate(${tf.x},${tf.y}) scale(${tf.k})`); }
function svgPoint(e) {
  const r = svg.getBoundingClientRect();
  // viewBoxはmeetでセンタリングされる
  const s = Math.min(r.width / W, r.height / H);
  return [(e.clientX - r.left - (r.width - W * s) / 2) / s, (e.clientY - r.top - (r.height - H * s) / 2) / s];
}
function zoomAt(px, py, factor) {
  const k2 = Math.max(1, Math.min(16, tf.k * factor));
  const f = k2 / tf.k;
  tf.x = px - (px - tf.x) * f;
  tf.y = py - (py - tf.y) * f;
  tf.k = k2;
  if (tf.k === 1) { tf.x = 0; tf.y = 0; }
  applyTf();
}
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const [px, py] = svgPoint(e);
  zoomAt(px, py, Math.exp(-e.deltaY * 0.0018));
}, { passive: false });
let pan = null;
svg.addEventListener('pointerdown', e => {
  pan = { x: e.clientX, y: e.clientY, tx: tf.x, ty: tf.y };
  svg.setPointerCapture(e.pointerId);
  svg.classList.add('panning');
});
svg.addEventListener('pointermove', e => {
  if (!pan) return;
  const r = svg.getBoundingClientRect();
  const s = Math.min(r.width / W, r.height / H);
  tf.x = pan.tx + (e.clientX - pan.x) / s;
  tf.y = pan.ty + (e.clientY - pan.y) / s;
  applyTf();
});
svg.addEventListener('pointerup', () => { pan = null; svg.classList.remove('panning'); });
document.getElementById('zin').onclick = () => zoomAt(W / 2, H / 2, 1.5);
document.getElementById('zout').onclick = () => zoomAt(W / 2, H / 2, 1 / 1.5);
document.getElementById('zreset').onclick = () => { tf = { x: 0, y: 0, k: 1 }; applyTf(); };

/* ---------- イベント ---------- */
sel.addEventListener('change', () => { current = IND_BY_KEY[sel.value]; repaint(); });
document.getElementById('overlay').addEventListener('change', renderOverlay);
document.getElementById('search').addEventListener('input', renderRanking);
dark.addEventListener('change', () => { setRamps(); repaint(); renderOverlay(); });

repaint();
</script>
