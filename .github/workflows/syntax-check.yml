# 構文チェック（軽量）: push のたびに JavaScript の構文エラーを検査
name: Syntax Check

on:
  push:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: node scripts/syntax-check.mjs
